# Kavach V3 CLMM — pools + per-day volume (charts).
# Token symbols/decimals: add later via Effect API or metadata job.

type Pool {
  id: ID!
  chainId: Int!
  address: String!
  token0: String!
  token1: String!
  feeTier: Int!
  tickSpacing: Int!
  volumeToken0: BigInt!
  volumeToken1: BigInt!
  swapCount: Int!
  createdAt: Timestamp!
  lastSwapAt: Timestamp
}

type PoolDayData {
  id: ID!
  pool_id: String!
  chainId: Int!
  dayStart: Timestamp!
  volumeToken0: BigInt!
  volumeToken1: BigInt!
  swapCount: Int!
}
